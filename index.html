<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINT Exam IDE</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar"></header>
      <div id="main-area">
        <aside id="sidebar">
          <div id="sidebar-header">
            <span>FILES</span>
            <div id="sidebar-actions">
              <button id="btn-sidebar-new-file" title="New File">&#128196;</button>
              <button id="btn-sidebar-new-folder" title="New Folder">&#128193;</button>
              <button id="btn-sidebar-new-notebook" title="New Notebook">Nb</button>
              <button id="btn-sidebar-import" title="Add File from outside">&#128229;</button>
            </div>
          </div>
          <div id="file-tree"></div>
        </aside>
        <div id="sidebar-resize-handle"></div>
        <div id="workspace">
          <div id="tab-bar"></div>
          <div id="editor-container"></div>
          <div id="output-panel" class="collapsed">
            <div id="output-resize-handle"></div>
            <div id="output-panel-header">
              <span>Output</span>
              <div id="output-controls">
                <button id="output-clear" title="Clear">Clear</button>
                <button id="output-toggle">&#9650;</button>
              </div>
            </div>
            <pre id="output-content"></pre>
          </div>
        </div>
      </div>
      <div id="log-panel" class="collapsed">
        <div id="log-panel-header">
          <span>Activity Log</span>
          <button id="log-toggle">&#9650;</button>
        </div>
        <div id="log-content"></div>
      </div>
      <footer id="status-bar"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
